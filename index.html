/* Enforced shared geometry:
   squares = 1 unit wide x 1 unit high
   rectangles = 2 units wide x 1 unit high */
.chord-map {
  --cell: 52px !important;
  --gap: 4px !important;
  width: calc((var(--cell) * 2) + var(--gap)) !important;
  grid-template-columns: repeat(2, var(--cell)) !important;
  grid-template-rows: repeat(5, var(--cell)) !important;
  gap: var(--gap) !important;
}

.map-I,
.map-vi {
  width: calc((var(--cell) * 2) + var(--gap)) !important;
  height: var(--cell) !important;
}

.map-ii,
.map-iii,
.map-IV,
.map-V,
.map-vii {
  width: var(--cell) !important;
  height: var(--cell) !important;
}

.map-vii {
  justify-self: center !important;
}

.stack {
  width: calc((52px * 2) + 4px) !important;
  gap: 4px !important;
}

.rect {
  width: calc((52px * 2) + 4px) !important;
  height: 52px !important;
  flex: 0 0 52px !important;
}

@media (max-width: 700px) {
  .chord-map {
    --cell: 44px !important;
    --gap: 3px !important;
    width: calc((var(--cell) * 2) + var(--gap)) !important;
    grid-template-columns: repeat(2, var(--cell)) !important;
    grid-template-rows: repeat(5, var(--cell)) !important;
  }

  .map-I,
  .map-vi {
    width: calc((var(--cell) * 2) + var(--gap)) !important;
    height: var(--cell) !important;
  }

  .map-ii,
  .map-iii,
  .map-IV,
  .map-V,
  .map-vii {
    width: var(--cell) !important;
    height: var(--cell) !important;
  }

  .stack {
    width: calc((44px * 2) + 3px) !important;
    gap: 3px !important;
  }

  .rect {
    width: calc((44px * 2) + 3px) !important;
    height: 44px !important;
    flex: 0 0 44px !important;
  }
}

/* Dark-glass visual redesign */
:root {
  --glass-bg:#081019;
  --glass-panel:#111a26;
  --glass-panel-2:#172232;
  --glass-border:#344152;
  --glass-border-soft:#243143;
  --glass-text:#e9eef7;
  --glass-muted:#aeb9c8;
  --glass-shadow:rgba(0,0,0,.55);
  --lead-blue:#2f73d8;
  --sub-green:#5ebd3e;
}

body {
  background:
    radial-gradient(circle at 50% 0%, rgba(64,82,110,.22), transparent 42%),
    linear-gradient(180deg, #121a26 0%, #070c13 100%) !important;
  color:var(--glass-text) !important;
}

.wrap {
  background:
    linear-gradient(180deg, rgba(19,29,42,.96), rgba(6,11,18,.98)) !important;
  border:3px solid rgba(112,130,154,.24);
  border-radius:34px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.04),
    0 18px 44px rgba(0,0,0,.55);
}

.wrap::before {
  content:"Comp-Map";
  position:absolute;
  left:50%;
  top:0.7%;
  transform:translateX(-50%);
  color:rgba(232,239,249,.78);
  font-weight:950;
  letter-spacing:3px;
  font-size:18px;
  z-index:5;
  pointer-events:none;
}

/* Main columns */
.stack,
.chord-map,
.progression-area {
  background:
    linear-gradient(180deg, rgba(26,39,56,.70), rgba(9,15,24,.70)) !important;
  border:2px solid rgba(123,143,169,.24);
  border-radius:22px;
  box-shadow:
    inset 0 0 22px rgba(255,255,255,.025),
    0 8px 24px rgba(0,0,0,.24);
  padding:8px !important;
}

.chord-map {
  padding:6px !important;
}

/* Buttons / controls */
.builder-controls {
  background:rgba(13,22,34,.72);
  border:2px solid rgba(123,143,169,.25);
  border-radius:16px;
  padding:6px;
  box-shadow:
    inset 0 0 12px rgba(255,255,255,.03),
    0 6px 16px rgba(0,0,0,.35);
}

.builder-btn,
.key-select,
.edit-btn {
  background:
    linear-gradient(180deg, #182436 0%, #090f18 100%) !important;
  color:var(--glass-text) !important;
  border:2px solid rgba(132,150,174,.42) !important;
  border-radius:13px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.09),
    0 3px 8px rgba(0,0,0,.38);
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.builder-btn.active,
.play-btn.active {
  background:
    linear-gradient(180deg, #dfe6f0 0%, #9daaba 100%) !important;
  color:#07101a !important;
  border-color:#e9eef7 !important;
  text-shadow:none;
}

.key-select option {
  background:#111a26;
  color:#e9eef7;
}

/* Diatonic selector */
.map-cell {
  background:
    linear-gradient(180deg, #202d3e 0%, #0b121d 100%) !important;
  color:var(--glass-text) !important;
  border:2px solid rgba(144,160,181,.44) !important;
  border-radius:12px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 4px 11px rgba(0,0,0,.38) !important;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.map-cell.active,
.map-cell.build-selected {
  background:
    linear-gradient(180deg, #e6edf7 0%, #a8b5c5 100%) !important;
  color:#07101a !important;
  border-color:#eef4ff !important;
  text-shadow:none;
}

/* Leading / substitution cards */
.rect {
  background:
    linear-gradient(180deg, #1d2a3c 0%, #0b121d 100%) !important;
  color:var(--glass-text) !important;
  border-radius:13px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.07),

  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.rect.lead {
  border-color:rgba(47,115,216,.84) !important;
}

.rect.sub {
  border-color:rgba(94,189,62,.84) !important;
}

/* 1.1.14 pulse-transfer animation for added chords */
.transfer-dot {
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  z-index:120;
  pointer-events:none;
  opacity:.95;
  box-shadow:0 0 12px currentColor, 0 0 22px currentColor;
  animation: transferFly 430ms ease-out forwards;
}

.transfer-dot.diatonic { color:#e9eef7; background:#e9eef7; }
.transfer-dot.lead { color:#4aa0ff; background:#4aa0ff; }
.transfer-dot.sub { color:#5ebd3e; background:#5ebd3e; }

.transfer-pulse {
  animation: sourcePulse 420ms ease-out 1;
}

@keyframes sourcePulse {
  0% { transform:scale(1); box-shadow:0 4px 11px rgba(0,0,0,.38); }
  35% { transform:scale(1.08); box-shadow:0 0 18px currentColor, 0 4px 11px rgba(0,0,0,.38); }
  100% { transform:scale(1); box-shadow:0 4px 11px rgba(0,0,0,.38); }
}

@keyframes transferFly {
  0% {
    transform:translate(0,0) scale(.7);
    opacity:0;
  }
  18% {
    opacity:1;
    transform:translate(calc(var(--dx) * .18), calc(var(--dy) * .18)) scale(1.35);
  }
  100% {
    transform:translate(var(--dx), var(--dy)) scale(.35);
    opacity:0;
  }
}

.prog-chord.added-pop {
  animation: addedPop 360ms ease-out 1;
}

@keyframes addedPop {
  0% { transform:scale(.92); opacity:.2; }
  45% { transform:scale(1.12); opacity:1; }
  100% { transform:scale(1); opacity:1; }
}

function makeSideChordButton(item,type,isSquare){
  const div=document.createElement("button");
  div.className=`rect ${type}${isSquare ? " side-square" : " side-rect"}`;
  div.innerHTML=`<div class="name">${displayName(item.name)}</div>`;
  div.onclick=e=>{
    e.stopPropagation();

    if(addMode && selectedDiatonic){
      lastAddSourceEl = div;
      addChordFromItem(item,type);
      return;
    }

    if(active===div){
      div.classList.remove("active");
      popup.classList.remove("show");
      active=null;
      return;
    }
    if(active) active.classList.remove("active");
    active=div;
    div.classList.add("active");
    popupTitle.innerHTML=popupHeaderHtml(item);
    popupNotes.innerHTML=notesForPopup(item);
    popupText.innerHTML=popupCommentHtml(item,type);
    positionPopup(div,type);
  };
  return div;

function renderStack(container,items,type){
  container.innerHTML="";
  items.forEach((item,idx)=>{
    const isSquare = idx >= 2;
    const btn = makeSideChordButton(item,type,isSquare);
    if(!isSquare){
      container.appendChild(btn);
      return;
    }
    if(idx % 2 === 0){
      const row=document.createElement("div");
      row.className="side-square-row";
      container.appendChild(row);
    }
    container.lastElementChild.appendChild(btn);
  });

  popup.style.width = popupW + "px";
  popup.style.maxHeight = gapHeight + "px";
  popup.style.overflowY = "auto";

  const pr = popup.getBoundingClientRect();
  const pW = pr.width;
  const pH = Math.min(pr.height, gapHeight);

  let left = (wr.width - pW) / 2;
  let top = gapTop + Math.max(0, (gapHeight - pH) / 2);

  left = Math.max(6, Math.min(wr.width - pW - 6, left));
  top = Math.max(6, Math.min(wr.height - pH - 6, top));

  popup.style.top = top + "px";

function visibleGroupBounds(groupEl, itemSelector){
  const items = Array.from(groupEl.querySelectorAll(itemSelector));
  const wrap = document.getElementById("wrap").getBoundingClientRect();

  if(items.length === 0){
    const r = groupEl.getBoundingClientRect();
    return {
      center:r.left - wrap.left + r.width/2,
      top:r.top - wrap.top,
      bottom:r.bottom - wrap.top
    };
  }

  let left=Infinity, right=-Infinity, top=Infinity, bottom=-Infinity;
  items.forEach(item=>{
    const r = item.getBoundingClientRect();
    left = Math.min(left, r.left - wrap.left);
    right = Math.max(right, r.right - wrap.left);
    top = Math.min(top, r.top - wrap.top);
    bottom = Math.max(bottom, r.bottom - wrap.top);
  });

  return {center:(left+right)/2, top, bottom};
}

function placePromptUnder(el, bounds, fixedTop){
  if(!el || !bounds) return;
  const wrap = document.getElementById("wrap").getBoundingClientRect();
  const promptR = el.getBoundingClientRect();

  // Center by putting the prompt's anchor at the group midpoint.
  // CSS transform: translateX(-50%) does the actual centering.
  let center = bounds.center;
  center = Math.max(promptR.width/2 + 2, Math.min(wrap.width - promptR.width/2 - 2, center));

  const top = Number.isFinite(fixedTop) ? fixedTop : bounds.bottom + 3;

  el.style.left = center + "px";
  el.style.top = Math.max(2, Math.min(wrap.height - promptR.height - 2, top)) + "px";
}

function rootAndSuffix(name){
  const clean=(name || "").replace(/[\[\]]/g,"").trim();
  const m=clean.match(/^([A-G](?:#|♭|b)?)(.*)$/);
  if(!m) return {root:clean,suffix:""};
  return {root:m[1],suffix:m[2] || ""};
}

function dedupeChordList(list){
  const seen=new Set();
  return list.filter(ch=>{
    if(seen.has(ch)) return false;
    seen.add(ch);
    return true;
  });
}

function baseFamilyKey(base){
  const b=(base || "").replace(/\[|\]/g,"").trim();
  if(b === "B°") return "Bdim";
  const rs=rootAndSuffix(b);
  const root=rs.root;
  const suffix=rs.suffix || "";
  if(root === "B" && /°|dim|ø|m7♭5|m7b5/.test(suffix)) return "Bdim";
  if(["C","Dm","Em","F","G","Am"].includes(root+suffix)) return root+suffix;
  if(["C","F","G"].includes(root) && suffix === "") return root;
  if(root === "D" && /^m/.test(suffix)) return "Dm";
  if(root === "E" && /^m/.test(suffix)) return "Em";
  if(root === "A" && /^m/.test(suffix)) return "Am";
  return b;
}

function chordExtensionOptionsForBox(box){
  if(!box) return [];

  const current = box.dataset.chord || "";
  const type = box.dataset.type || "diatonic";
  const base = box.dataset.baseChord || reverseToBaseChord(current);
  const currentRoot = rootAndSuffix(current).root;
  const baseRoot = rootAndSuffix(base).root;
  const root = currentRoot || transposeChordName(baseRoot);
  const baseSuffix = rootAndSuffix(base).suffix || "";

  /*
    Role-aware extension choices. For diatonic chords these are restricted to
    notes that fit the parent major key, so V offers dominant options, not maj7.
    The table is in the C-major template and is transposed by root/key display.
  */
  const diatonicRoleOptions = {
    "C":    ["", "6", "add9", "6/9", "maj7", "maj9", "maj13"],
    "Dm":   ["m", "m7", "m9", "m11", "m13"],
    "Em":   ["m", "m7", "m(add♭9)", "m7(♭9)", "m11(no9)"],
    "F":    ["", "6", "add9", "6/9", "maj7", "maj9", "maj7#11", "maj13#11"],
    "G":    ["", "7", "9", "13", "7sus4", "9sus4", "13sus4"],
    "Am":   ["m", "m7", "m9", "m11", "m7(♭13)", "m11(♭13)"],
    "Bdim": ["°", "m7♭5", "ø7"]
  };

  const canonicalBase = baseFamilyKey(base);
  if(type === "diatonic" && diatonicRoleOptions[canonicalBase]){
    return dedupeChordList(diatonicRoleOptions[canonicalBase].map(sf=>root+sf));
  }

  const s = baseSuffix || rootAndSuffix(current).suffix || "";
  const isDim = /°|dim|ø|m7♭5|m7b5/.test(s);
  const isMinor = !isDim && /^m(?!aj)/.test(s);
  const isDominant = type === "lead" || (/7/.test(s) && !/maj7|M7|Δ|m7/.test(s));

  let suffixes;
  if(isDim){
    suffixes=["°","m7♭5","ø7"];
  } else if(isDominant){
    suffixes=["7","9","13","7♭9","13♭9","7sus4","13sus4"];
  } else if(isMinor){
    suffixes=["m","m7","m9","m11","m13"];
  } else {
    suffixes=["","6","add9","6/9","maj7","maj9","maj13"];
  }

  return dedupeChordList(suffixes.map(sf=>root+sf));
}

function chordVoicingOptionsForBox(box){
  if(!box) return [];
  const type = box.dataset.type || "diatonic";
  const family = baseFamilyKey(box.dataset.baseChord || reverseToBaseChord(box.dataset.chord || ""));
  const current = box.dataset.chord || "";
  const suffix = rootAndSuffix(current).suffix || "";
  const isDim = /°|dim|ø|m7♭5|m7b5/.test(suffix) || family === "Bdim";
  const isMinor = !isDim && /^m(?!aj)/.test(suffix);
  const isDominant = type === "lead" || (/7|9|13|sus/.test(suffix) && !/maj|Δ/.test(suffix) && !/^m/.test(suffix));

  if(isDim){
    return [
      {id:"shell-5", rootString:"5", label:"5th-string half-diminished shell", detail:"compact jazz grip; root on A string"},
      {id:"shell-6", rootString:"6", label:"6th-string diminished/shell grip", detail:"movable low-root version"},
      {id:"top-4", rootString:"4", label:"top-four-string color grip", detail:"good for passing diminished sounds"}
    ];
  }

  if(isDominant){
    return [
      {id:"dom-6", rootString:"6", label:"6th-string dominant grip", detail:"root on low E; good for V and secondary dominants"},
      {id:"dom-5", rootString:"5", label:"5th-string dominant grip", detail:"root on A string; compact comping shape"},
      {id:"dom-shell", rootString:"6", label:"6th-string 3–7 shell", detail:"lean jazz shell; leaves room for 9/13 color"},
      {id:"dom-top", rootString:"4", label:"top-four dominant color", detail:"lighter voicing for 9/13/sus sounds"}
    ];
  }

  if(isMinor){
    return [
      {id:"min-6", rootString:"6", label:"6th-string minor grip", detail:"root on low E; movable minor-family shape"},
      {id:"min-5", rootString:"5", label:"5th-string minor grip", detail:"root on A string; common m7/m9 area"},
      {id:"min-shell", rootString:"5", label:"5th-string minor shell", detail:"compact 3–7 sound for ii/iii/vi"},
      {id:"min-top", rootString:"4", label:"top-four minor color", detail:"useful for m9/m11/m13 color"}
    ];
  }

  return [
    {id:"maj-6", rootString:"6", label:"6th-string major grip", detail:"root on low E; movable major-family shape"},
    {id:"maj-5", rootString:"5", label:"5th-string major grip", detail:"root on A string; common maj7/6/9 area"},
    {id:"maj-shell", rootString:"5", label:"5th-string major shell", detail:"compact 3–7 sound for I/IV"},
    {id:"maj-top", rootString:"4", label:"top-four major color", detail:"lighter voicing for 6/9/maj9/maj13"}
  ];
}

const NOTE_TO_PC={"C":0,"C#":1,"D♭":1,"D":2,"D#":3,"E♭":3,"E":4,"F":5,"F#":6,"G♭":6,"G":7,"G#":8,"A♭":8,"A":9,"A#":10,"B♭":10,"B":11};
const STRING_OPEN_PC=[4,9,2,7,11,4]; // low E to high E
const STRING_OPEN_MIDI=[40,45,50,55,59,64]; // low E to high E, for determining lowest sounding note
function rootPcFromChordName(ch){
  const m=String(ch||"").match(/^([A-G](?:#|♭)?)/);
  return m ? NOTE_TO_PC[m[1]] : 0;
}
function pcToDisplayName(pcVal){
  const arr = preferFlats() ? PC_FLAT : PC_SHARP;
  return arr[((pcVal % 12) + 12) % 12];
}
function fretForRootOnString(rootPc, stringNum){
  const idx=6-Number(stringNum);
  const open=STRING_OPEN_PC[idx];
  let f=(rootPc-open+12)%12;
  // 1.2.41: use true open-string diagrams instead of wrapping root positions to the 12th fret.
  if(f===0) return 0;
  return f;
}
function suffixFamilyForDiagram(box){
  const type=box.dataset.type || "diatonic";
  const suffix=rootAndSuffix(box.dataset.chord || "").suffix || "";
  const family=baseFamilyKey(box.dataset.baseChord || reverseToBaseChord(box.dataset.chord || ""));
  if(/°|dim|ø|m7♭5|m7b5/.test(suffix) || family==="Bdim") return "dim";
  if(type==="lead" || (/7|9|13|sus/.test(suffix) && !/maj|Δ/.test(suffix) && !/^m/.test(suffix))) return "dom";
  if(/^m(?!aj)/.test(suffix)) return "min";
  return "maj";
}
function diagramTemplatesForBox(box){
  const fam=suffixFamilyForDiagram(box);
  const chordName=box.dataset.chord || box.dataset.baseChord || "C";
  const suffix=rootAndSuffix(chordName).suffix || "";
  const chordLabel=displayName(chordName);
  const X="x";

  /*
    1.2.8: popular-of-the-popular jazz guitar voicing library.
    These are not exhaustive theory stacks. They are compact movable grips in
    common jazz-guitar families: shell/guide-tone, drop-style middle-string
    grips, compact color voicings, and top-four-string options. The 5th is
    often omitted in extended chords; 13th voicings commonly omit the 9th.

    rel is low-E to high-E. Numeric values are fret offsets from the chosen
    root-string fret. "x" means muted. rootIdx identifies the root note.
  */
  function t(id, rootString, nameExtra, rel, rootIdx){
    const extra=nameExtra ? ` ${nameExtra}` : "";
    return {id, rootString:String(rootString), name:`${chordLabel} S${rootString}${extra}`, rel, rootIdx};
  }

  if(fam==="dom"){
    if(/sus/.test(suffix) && /13/.test(suffix)) return [
      t("dom13sus-6-a",6,"popular no5",[0,X,0,0,2,X],0),
      t("dom13sus-6-b",6,"top color",[0,X,0,0,2,2],0),
      t("dom13sus-5-a",5,"popular no5",[X,0,0,0,2,X],1),
      t("dom13sus-5-b",5,"compact",[X,0,0,0,2,2],1),
      t("dom13sus-4-a",4,"top four",[X,X,0,0,1,2],2)
    ];

    if(distinct.length>2) return false;

function generatedChordToneTemplatesForBox(box){
  const chordName=box.dataset.chord || box.dataset.baseChord || "C";
  const suffix=rootAndSuffix(chordName).suffix || "";
  const fam=suffixFamilyForDiagram(box);
  const rootPc=rootPcFromChordName(chordName);
  const info=expectedChordToneInfo(rootPc, suffix, fam);
  const sets=PREFERRED_DIAGRAM_SETS;
  const out=[];
  const seen=new Set();
  const chordLabel=displayName(chordName);
  function addAbs(abs, setIdx){
    if(!compactSpanOk(abs)) return;
    const pcs=[];
    abs.forEach((f,i)=>{ if(f!==null) pcs.push((STRING_OPEN_PC[i]+f)%12); });
    if(pcs.some(pc=>!info.allowed.has(pc))) return;
    for(const pc of info.strong){ if(!pcs.includes(pc)) return; }
    for(const pc of info.requiredTop){ if(!pcs.includes(pc)) return; }
    if(!info.requiredTop.size && info.color.size){
      let hasColor=false;
      for(const pc of info.color){ if(pcs.includes(pc)) { hasColor=true; break; } }
      if(!hasColor) return;
    }
    // Rootful by default for the interactive [Sx] label. Rootless can come
    // later as an explicit mode.
    const rootIdx=abs.findIndex((f,i)=>f!==null && (STRING_OPEN_PC[i]+f)%12===rootPc);
    if(rootIdx<0) return;
    const sig=abs.map(f=>f===null?"x":String(f)).join(",");
    if(seen.has(sig)) return;
    seen.add(sig);
    out.push({
      id:`gen-${setIdx+1}-${sig.replace(/[^0-9x]/g,"_")}`,
      rootString:String(6-rootIdx),
      name:`${chordLabel} S${6-rootIdx}`,
      abs,
      rootIdx,
      generated:true,
      preferred:true,
      setIdx
    });

  sets.forEach((set,setIdx)=>{
    const choices=set.map(i=>chordToneCandidateFretsForString(i, info.allowed));
    // Cap very large search branches but keep low/open positions first.
    const limited=choices.map(a=>a.slice(0,10));
    function rec(pos, abs){

      const stringIdx=set[pos];
      for(const f of limited[pos]){
        const next=abs.slice();
        next[stringIdx]=f;

function inversionFilterForBox(box){

function visibleDiagramTemplatesForBox(box){
  const rootPc=rootPcFromChordName(box.dataset.chord || box.dataset.baseChord || "C");
  const pools=[
    ...openCowboyTemplatesForBox(box),
    ...generatedChordToneTemplatesForBox(box),

  const raw=pools
    .filter(tpl=>diagramWithinVisibleFretLimit(tpl, rootPc))
    .filter(tpl=>compactSpanOk(absoluteDiagramFrets(tpl, rootPc)))
    .filter(tpl=>diagramMatchesChord(box, tpl, rootPc))
    .filter(tpl=>templateMatchesInversionFilter(box, tpl, rootPc));
  const seen=new Set();
  const unique=[];
  raw.forEach(tpl=>{
    const sig=diagramTemplateSignature(tpl, rootPc);
    if(seen.has(sig)) return;
    seen.add(sig);
    unique.push(tpl);
  });
  return unique.sort((a,b)=>{
    // 1.2.56: prioritize closed, transposable chord forms.
    // A transposable diagram has no open strings. Among those, favor compact
    // forms whose fingered notes span no more than three frets.
    const faAll=absoluteDiagramFrets(a, rootPc);
    const fbAll=absoluteDiagramFrets(b, rootPc);
    const ao=faAll.includes(0);
    const bo=fbAll.includes(0);
    const aClosed=!ao;

    const fa=faAll.filter(f=>f!==null && f>0);
    const fb=fbAll.filter(f=>f!==null && f>0);
    const sa=fa.length ? Math.max(...fa)-Math.min(...fa) : 0;
    const sb=fb.length ? Math.max(...fb)-Math.min(...fb) : 0;

    const bCompact=sb<=3;
    if(aClosed && bClosed && aCompact!==bCompact) return aCompact ? -1 : 1;

    const pa=preferredScore(a), pb=preferredScore(b);
    if(pa!==pb) return pb-pa;

    const la=fa.length ? Math.min(...fa) : 0;
    const lb=fb.length ? Math.min(...fb) : 0;

function theoreticalChordTonePcs(rootPc, suffix, fam){
  const s=normalizeSuffixForValidation(suffix);
  const out=[];
  const addPc=(n)=>{
    const pc=(rootPc+n+120)%12;
    if(!out.includes(pc)) out.push(pc);
  };
  addPc(0);
  const isSus=/sus/.test(s);
  if(isSus){
    if(/sus2/.test(s)) addPc(2);
    else addPc(5);
  } else if(fam==="min" || /^m(?!aj)/.test(s)) addPc(3);
  else if(fam==="dim" || /°|dim|ø|m7♭5/.test(s)) addPc(3);
  else addPc(4);

  if(fam==="dim" || /°|dim|ø|m7♭5/.test(s)) addPc(6);
  else addPc(7);

  const hasMaj7=/maj7|Δ/.test(s);
  const hasPlain7=/(7|9|11|13)/.test(s) && !hasMaj7;
  if(hasMaj7) addPc(11);
  else if(hasPlain7) addPc(10);

  if(/6\/?9/.test(s)) addPc(9);
  else if(/6/.test(s)) addPc(9);

  if(/13/.test(s)) addPc(9);
  else if(/11/.test(s)) addPc(5);
  else if(/♭9/.test(s)) addPc(1);
  else if(/9|add9/.test(s)) addPc(2);

  return out;
}
function diagramIncludedPcs(tpl, rootPc){
  const frets=absoluteDiagramFrets(tpl, rootPc);
  const pcs=[];
  frets.forEach((f,i)=>{
    if(f!==null && f!==undefined && Number.isFinite(Number(f)) && Number(f)>=0){
      const pc=(STRING_OPEN_PC[i]+Number(f))%12;
      if(!pcs.includes(pc)) pcs.push(pc);
    }
  });
  return pcs;
}
function theoreticalChordToneDegrees(rootPc, suffix, fam){
  const s=normalizeSuffixForValidation(suffix);
  const out=[];
  const add=(n,label)=>{
    const pc=(rootPc+n+120)%12;
    if(!out.some(x=>x.pc===pc && x.label===label)) out.push({pc,label});
  };
  add(0,"1");

  const isSus=/sus/.test(s);
  if(isSus){
    if(/sus2/.test(s)) add(2,"2");
    else add(5,"4");
  } else if(fam==="min" || /^m(?!aj)/.test(s)) add(3,"♭3");
  else if(fam==="dim" || /°|dim|ø|m7♭5/.test(s)) add(3,"♭3");
  else add(4,"3");

  if(fam==="dim" || /°|dim|ø|m7♭5/.test(s)) add(6,"♭5");
  else add(7,"5");

  const hasMaj7=/maj7|Δ/.test(s);
  const hasPlain7=/(7|9|11|13)/.test(s) && !hasMaj7;
  if(hasMaj7) add(11,"7");
  else if(hasPlain7) add(10,"♭7");

  if(/6\/9/.test(s)){
    add(9,"6");
    add(2,"9");
  } else if(/6/.test(s) && !/13/.test(s)) add(9,"6");

  if(/13/.test(s)) add(9,"13");
  else if(/11/.test(s)) add(5,"11");
  else if(/♭9/.test(s)) add(1,"♭9");
  else if(/9|add9/.test(s)) add(2,"9");

  return out;
}
function diatonicPcsForCurrentKey(){

function renderDiagramToneRowHtml(tpl, rootPc, box){
  if(!box) return "";
  const chordName=box.dataset.chord || box.dataset.baseChord || "C";
  const suffix=rootAndSuffix(chordName).suffix || "";

  const spans=theoretical.map(tone=>{

    if(!diatonic.includes(tone.pc)) classes.push("diagram-tone-nondiatonic");
    return `<span class="${classes.join(" ")}">${tone.label}</span>`;
  }).join("");

function renderDiagramHtml(tpl, rootPc, box=null){
  let frets=absoluteDiagramFrets(tpl, rootPc).map(f=>{
    if(f===null || f===undefined) return null;
    const n=Number(f);
    return Number.isFinite(n) ? n : null;
  });
  while(frets.length<6) frets.push(null);
  frets=frets.slice(0,6);
  const played=frets.filter(f=>f!==null && f>=0);
  const fingered=played.filter(f=>f>0);
  const hasOpen=played.some(f=>f===0);
  // If the whole fingering fits in the first four frets, draw it as a
  // normal nut-position diagram: fret 1 is shown by the first grid space and
  // is not numbered. Only up-neck shapes start at the lowest fingered fret and
  // receive a fret label.
  const firstPosition = fingered.length === 0 || fingered.every(f => f >= 1 && f <= 4);
  let low = firstPosition ? 1 : (fingered.length ? Math.min(...fingered) : 1);
  if(!isFinite(low) || low<1) low=1;
  const fretLabel = firstPosition ? "" : `${low}fr`;
  // 1.2.70: Never allow a fretted string to become visually undefined.
  // The old fixed four-fret window could hide a fingered note when the
  // fingering spanned from, for example, 3fr to 7fr. In that case the string
  // had no dot and no x/o. The diagram now expands just enough rows to show
  // every positive fret; first-position chords still use the standard 1-4
  // nut view with no fret number.
  const maxFinger = fingered.length ? Math.max(...fingered) : low;
  const span = firstPosition ? 4 : Math.max(4, maxFinger - low + 1);
  const w=92, h=82, top=16, left=10, right=10, bottom=8;
  const usableW=w-left-right;
  const usableH=h-top-bottom;
  const stringX=s=>left + (usableW*(s/5));
  const fretY=r=>top + (usableH*(r/span));
  const fretMidY=f=>{
    if(f===0) return top-8;
    const r=f-low;
    if(r<0 || r>=span) return null;
    return (fretY(r)+fretY(r+1))/2;
  };
  const strings=Array.from({length:6},(_,s)=>`<line x1="${stringX(s)}" y1="${top}" x2="${stringX(s)}" y2="${top+usableH}"/>`).join("");
  const fretsSvg=Array.from({length:span+1},(_,r)=>`<line x1="${left}" y1="${fretY(r)}" x2="${left+usableW}" y2="${fretY(r)}"/>`).join("");
  const dots=frets.map((f,s)=>{
    if(f===null || f===0) return "";
    const y=fretMidY(f);
    if(y===null) return "";
    const cls=(s===tpl.rootIdx ? "diagram-svg-dot root" : "diagram-svg-dot");
    return `<circle class="${cls}" cx="${stringX(s)}" cy="${y}" r="5.5"/>`;
  }).join("");
  // Every non-fingered string is explicitly marked above the nut/grid:
  // × for muted, ○ for open. Fingered strings are marked by their solid dot.
  const stringStateMarks=frets.map((f,s)=>{
    if(f===null) return `<text class="diagram-svg-muted" x="${stringX(s)}" y="10">×</text>`;
    if(f===0){
      const cls=(s===tpl.rootIdx ? "diagram-svg-dot root open-string" : "diagram-svg-dot open-string");
      return `<circle class="${cls}" cx="${stringX(s)}" cy="10" r="5.5"/>`;
    }
    return "";
  }).join("");
  const toneRow=renderDiagramToneRowHtml(tpl, rootPc, box);
  return `<div class="chord-diagram svg-diagram"><svg viewBox="0 0 ${w} ${h}" aria-label="${tpl.name}"><text class="diagram-svg-fret" x="0" y="${top+8}">${fretLabel}</text><g class="diagram-svg-lines">${strings}${fretsSvg}</g>${stringStateMarks}<g>${dots}</g></svg>${toneRow}</div>`;
}

const PREFERRED_DIAGRAM_SETS=[
  [0,2,3,4], // strings 6-4-3-2
  [1,2,3,4], // strings 5-4-3-2
  [2,3,4,5], // strings 4-3-2-1
  [1,3,4,5]  // strings 5-3-2-1
];
function playedStringIndexes(tpl){
  const arr=tpl.rel || tpl.abs || [];
  return arr.map((r,i)=>(r==="x" || r===null) ? null : i).filter(i=>i!==null);
}
function sameIndexSet(a,b){
  return a.length===b.length && a.every((v,i)=>v===b[i]);
}
function isPreferredDiagram(tpl){
  const played=playedStringIndexes(tpl);
  return PREFERRED_DIAGRAM_SETS.some(set=>sameIndexSet(played,set));
}
function preferredScore(tpl){
  const played=playedStringIndexes(tpl);
  const idx=PREFERRED_DIAGRAM_SETS.findIndex(set=>sameIndexSet(played,set));
  if(idx>=0) return 100-idx;
  // Near-preferred shapes are still useful, but should come after exact four-note grips.
  const containsPreferred=PREFERRED_DIAGRAM_SETS.some(set=>set.every(i=>played.includes(i)) && set.includes(tpl.rootIdx));

  if(played.length===4) return 20;

}
function expandPreferredDiagramVariants(templates){
  const out=[];
  const seen=new Set();
  function add(tpl){
    const key=(tpl.rel || tpl.abs || []).join(",")+"|"+tpl.rootIdx+"|"+tpl.rootString;
    if(seen.has(key)) return;
    seen.add(key);
    out.push(tpl);
  }
  templates.forEach(tpl=>{
    add(tpl);
    const played=playedStringIndexes(tpl);
    PREFERRED_DIAGRAM_SETS.forEach((set,setIdx)=>{
      if(!set.includes(tpl.rootIdx)) return;
      if(!set.every(i=>played.includes(i))) return;
      if(sameIndexSet(played,set)) return;
      const rel=tpl.rel.map((r,i)=>set.includes(i) ? r : "x");
      add({
        ...tpl,
        id:`${tpl.id}-pref${setIdx+1}`,
        name:`${tpl.name} preferred`,
        rel,
        preferred:true
      });
    });
  });
  return out.sort((a,b)=>preferredScore(b)-preferredScore(a));
}

    return `<g><circle class="${cls}" cx="${x}" cy="${fretMidY(f)}" r="14"/>${label ? `<text class="${labelCls}" x="${x}" y="${fretMidY(f)}">${label}</text>` : ""}</g>`;
  }).join("");
  const toneRow=box ? renderDiagramToneRowHtml(tpl, rootPc, box).replace('diagram-tone-row','diagram-tone-row arrange-fretboard-tone-row') : "";
  return `<svg class="arrange-fretboard-svg" viewBox="0 0 ${w} ${h}" aria-label="Fretboard fingering">${stringLabels}${pearls}${strings}${fretsSvg}${fretNums}${marks}</svg>${toneRow}`;
}

function playAddAnimation(sourceEl, targetEl, type){
  if(!sourceEl || !targetEl) return;

  const wrap = document.getElementById("wrap");
  const wr = wrap.getBoundingClientRect();
  const sr = sourceEl.getBoundingClientRect();
  const tr = targetEl.getBoundingClientRect();

  const startX = sr.left - wr.left + sr.width/2;
  const startY = sr.top - wr.top + sr.height/2;
  const endX = tr.left - wr.left + tr.width/2;
  const endY = tr.top - wr.top + tr.height/2;

  const dot = document.createElement("div");
  dot.className = `transfer-dot ${chordTypeForAnimation(type)}`;
  dot.style.left = `${startX - 6}px`;
  dot.style.top = `${startY - 6}px`;
  dot.style.setProperty("--dx", `${endX - startX}px`);
  dot.style.setProperty("--dy", `${endY - startY}px`);
  wrap.appendChild(dot);

  sourceEl.classList.remove("transfer-pulse");
  void sourceEl.offsetWidth;
  sourceEl.classList.add("transfer-pulse");

  targetEl.classList.remove("added-pop");
  void targetEl.offsetWidth;
  targetEl.classList.add("added-pop");

  setTimeout(()=>dot.remove(), 520);
}

  box.dataset.baseChord=transposeChordName(name)===name && keyOffset()!==0 ? name : reverseToBaseChord(name);
  box.dataset.chord=name;
  box.dataset.type=type;
  box.dataset.beats=String(beats);
  if(meta.fn) box.dataset.roleFn=meta.fn;
  if(meta.target) box.dataset.targetChord=meta.target;
  refreshChordNotation(box);
  attachProgressionEdit(box);
  if(beforeNode) progressionArea.insertBefore(box,beforeNode);
  else progressionArea.appendChild(box);
  updateProgressionKeyLine();

  const src = sourceEl || findSourceElementForChord(name,type);
  setTimeout(()=>playAddAnimation(src, box, type), 20);

  return box;
}

function chordSequenceFromItem(item,type){
  const seq=[];
  if(type==="lead"){
    if(item.name.includes("→")){
      const parts=item.name.split("→").map(s=>s.trim()).filter(Boolean);
      parts.forEach(p=>seq.push({name:p,type:"lead",beats:2,fn:item.fn,target:dataForDisplay(selectedDiatonic).chord}));
    } else {
      seq.push({name:item.name,type:"lead",beats:4,fn:item.fn,target:dataForDisplay(selectedDiatonic).chord});
    }
    seq.push({name:dataForDisplay(selectedDiatonic).chord,type:"diatonic",beats:4,fn:"target"});
  } else if(type==="sub"){
    seq.push({name:item.name,type:"sub",beats:4,fn:item.fn,target:dataForDisplay(selectedDiatonic).chord});
  } else if(type==="diatonic"){
    seq.push({name:dataForDisplay(selectedDiatonic).chord,type:"diatonic",beats:4,fn:"target"});
  }
  return seq;
}

function addSequence(seq,beforeNode=null,sourceEl=null){

}

function guessChordTypeFromText(chord){
  const clean = chord.replace(/^\[/,"").replace(/\]$/,"");
  const baseClean = reverseToBaseChord ? reverseToBaseChord(clean) : clean;
  const allDiatonic = order.map(k => dataForDisplay(k).chord);
  if(allDiatonic.includes(clean)) return "diatonic";

  // Prefer color coding based on the currently visible chord sets.
  const visibleLead = dataForDisplay(currentKey).leads.map(i=>i.name);
  const visibleSub = dataForDisplay(currentKey).subs.map(i=>i.name);
  if(visibleLead.includes(clean)) return "lead";
  if(visibleSub.includes(clean)) return "sub";

  // Bracketed chords are non-diatonic; default them to substitution color.
  if(chord.trim().startsWith("[")) return "sub";
  return "diatonic";
}

function tokenizeProgression(text){
  const tokens = [];
  // Bracketed items include non-diatonic chords, the saved key header, and
  // saved fingering codes. The chord token is intentionally broad enough to
  // keep extensions like maj9, m11, 13, 7♭9, and 6/9 intact.
  const re = /\[[^\]]+\]|\/|[A-G](?:#|♭|b)?(?:maj13|maj9|maj7|m7♭5|m7b5|m13|m11|m9|m7|m6|m|13|11|9|7♭9|7b9|7#9|7♯9|7♭13|7b13|7#11|7♯11|7|6\/9|6|add9|dim|°|ø)?/g;
  let m;
  while((m = re.exec(text)) !== null){
    tokens.push(m[0]);
  }
  return tokens;
}

function assimilateProgression(text, append=false){
  const tokens = tokenizeProgression(text);
  if(tokens.length === 0) return;

  if(!append){
    progressionArea.innerHTML = "";
  }

  let i = 0;
  let lastBox = null;
  while(i < tokens.length){
    const tok = tokens[i];

    if(tok === "/"){
      i++;
      continue;
    }

    let chord = tok;
    let bracketed = false;
    if(chord.startsWith("[") && chord.endsWith("]")){
      bracketed = true;
      chord = chord.slice(1,-1).trim();

      // [C/Am] is the saved key header, not a chord. Restore the key when
      // possible and do not add it to the progression.
      const keyMatch = KEY_OPTIONS.find(([root,label]) => label === chord);
      if(keyMatch){
        selectedKeyRoot = keyMatch[0];
        if(keySelect) keySelect.value = selectedKeyRoot;
        i++;
        continue;
      }

      // [x02020] or [x-10-9-8-x-x] is a saved fingering for the preceding
      // chord. Attach it to that chord rather than treating it as a chord.
      if(isFingeringCode(chord)){
        if(lastBox){
          lastBox.dataset.fingeringCode = chord;
          const tpl = fingeringTemplateFromCode(lastBox, chord);
          if(tpl && tpl.rootString) lastBox.dataset.rootString = String(tpl.rootString);
          refreshChordNotation(lastBox);
        }
        i++;
        continue;
      }
    }

    let beats = 1;
    i++;

    // A fingering code immediately after the chord belongs to this chord;
    // consume it before counting beat slashes.
    let pendingFingering = "";
    if(i < tokens.length && tokens[i].startsWith("[") && tokens[i].endsWith("]")){
      const maybeCode = tokens[i].slice(1,-1).trim();
      if(isFingeringCode(maybeCode)){
        pendingFingering = maybeCode;
        i++;
      }
    }

    while(i < tokens.length && tokens[i] === "/"){
      beats++;
      i++;
    }

    const type = bracketed ? guessChordTypeFromText(`[${chord}]`) : guessChordTypeFromText(chord);
    lastBox = addProgressionBox(chord, type, beats);
    if(pendingFingering){
      lastBox.dataset.fingeringCode = pendingFingering;
      const tpl = fingeringTemplateFromCode(lastBox, pendingFingering);
      if(tpl && tpl.rootString) lastBox.dataset.rootString = String(tpl.rootString);
      refreshChordNotation(lastBox);
    }
  }
}

function isPlainFingeringCode(code){
  return /^[xX0-9]{6}$/.test(code || "");
}

function isDelimitedFingeringCode(code){
  return /^(?:x|X|\d+)(?:-(?:x|X|\d+)){5}$/.test(code || "");
}

function isFingeringCode(code){
  return isPlainFingeringCode(code) || isDelimitedFingeringCode(code);
}

function fingeringCodeFromFrets(frets){
  if(!Array.isArray(frets) || frets.length !== 6) return "";
  const vals = frets.map(f => f === null || f === undefined ? "x" : String(Number(f)));
  // Use the compact familiar form for ordinary cowboy/low-position grips,
  // e.g. A7 = x02020. If any string uses fret 10 or 11, use delimiters so
  // the saved pattern remains unambiguous.
  if(vals.every(v => v === "x" || /^[0-9]$/.test(v))) return vals.join("");
  return vals.join("-");
}

function fretsFromFingeringCode(code){
  if(!isFingeringCode(code)) return null;
  const parts = isDelimitedFingeringCode(code) ? code.split("-") : code.split("");
  if(parts.length !== 6) return null;
  return parts.map(v => /^x$/i.test(v) ? null : Number(v));
}

function fingeringCodeForBox(box){
  if(!box) return "";
  if(isFingeringCode(box.dataset.fingeringCode || "")) return box.dataset.fingeringCode;
  const tpl = selectedTemplateForArrange(box);
  if(!tpl) return "";
  const rootPc = rootPcFromChordName(box.dataset.chord || box.dataset.baseChord || "C");
  const code = fingeringCodeFromFrets(absoluteDiagramFrets(tpl, rootPc));
  if(code) box.dataset.fingeringCode = code;
  return code;
}

function fingeringTemplateFromCode(box, code){
  const abs = fretsFromFingeringCode(code);
  if(!abs) return null;
  const rootPc = rootPcFromChordName(box.dataset.chord || box.dataset.baseChord || "C");
  const rootIdx = abs.findIndex((f,i) => f !== null && (STRING_OPEN_PC[i] + f) % 12 === rootPc);
  const idx = rootIdx >= 0 ? rootIdx : abs.findIndex(f => f !== null);
  return {
    id:`saved-${code}`,
    rootString:String(idx >= 0 ? 6 - idx : (box.dataset.rootString || "")),
    name:`${displayName(box.dataset.chord || "Chord")} saved`,
    abs,
    rootIdx:idx >= 0 ? idx : 0,
    saved:true
  };
}

// 1.2.69: Copy/paste text is the source of truth: key header plus any saved six-string fingering codes.
function progressionText(){
  const boxes = Array.from(progressionArea.querySelectorAll(".prog-chord"));
  const body = boxes.map(box => {
    const name = box.dataset.chord || "";
    const type = box.dataset.type || "diatonic";
    const beats = Number(box.dataset.beats || 4);
    const shown = displayName(name);
    const symbol = type === "diatonic" ? shown : `[${shown}]`;
    const code = fingeringCodeForBox(box);
    const fingering = code ? `[${code}]` : "";
    const slashes = Array(Math.max(0, beats - 1)).fill("/").join(" ");
    const chordText = `${symbol}${fingering}`;
    return slashes ? `${chordText} ${slashes}` : chordText;
  }).join("  ");
  const keyLine = `[${currentKeySaveLabel()}]`;
  return body ? `${keyLine}\n\n${body}` : keyLine;
}


// 1.2.39: Selecting a diagram immediately copies the updated progression.
// 1.2.38: Paste appends clipboard contents to the end of the existing progression.
// 1.2.37: Auto-copy the current progression after any edit that changes it.
// This gives a temporary clipboard backup if the page is closed accidentally.
let autoCopyTimer = null;
async function autoCopyProgression(){
  const text = progressionText();
  if(!text) return;
  clearTimeout(autoCopyTimer);
  autoCopyTimer = setTimeout(async ()=>{
    try {
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        return;
      }
    } catch(err) {
      // Fall through to execCommand fallback below.
    }
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      ta.remove();
    } catch(err) {}
  }, 40);
}

// 1.2.39: Immediate copy for direct user actions such as selecting a diagram.
// This avoids losing the browser's user-gesture clipboard permission window.
async function copyProgressionNow(){
  const text = progressionText();
  if(!text) return;
  try {
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return;
    }
  } catch(err) {
    // Fall through to execCommand fallback below.
  }
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand("copy");
    ta.remove();
  } catch(err) {}
}

let audioCtx=null;
let isPlaying=false;
let playIndex=0;
let playTimeout=null;
let currentPlayingBox=null;
let activeAudioNodes=[];
const BPM=100;
const BEAT_SEC=60/BPM;

const NOTE_MIDI = {
  "C":60,"C#":61,"D♭":61,"Db":61,"D":62,"D#":63,"E♭":63,"Eb":63,"E":64,"F":65,"F#":66,"G♭":66,"Gb":66,
  "G":67,"G#":68,"A♭":68,"Ab":68,"A":69,"A#":70,"B♭":70,"Bb":70,"B":71,"Cb":71
};

function midiToFreq(m){ return 440 * Math.pow(2,(m-69)/12); }

function chordPcsFromName(name){
  name = (name || "C").replace(/^\[/,"").replace(/\]$/,"").trim();

  const rootMatch = name.match(/^[A-G](?:#|♭|b)?/);
  if(!rootMatch) return [60,64,67];

  const rootText = rootMatch[0].replace("b","♭");
  let rootMidi = NOTE_MIDI[rootText] ?? 60;

  // Keep chords in a comfortable register and avoid an octave-dropped bass.
  if(rootMidi < 60) rootMidi += 12;

  const quality = name.slice(rootMatch[0].length);

  let intervals;
  if(/m7♭5|m7b5|ø/.test(quality)){
    intervals = [0,3,6,10];
  } else if(/maj7|M7|Δ/.test(quality)){
    intervals = [0,4,7,11];
  } else if(/^m7/.test(quality)){
    intervals = [0,3,7,10];
  } else if(/7/.test(quality)){
    intervals = [0,4,7,10];
  } else if(/°|dim/.test(quality)){
    intervals = [0,3,6];
  } else if(/^m/.test(quality)){
    intervals = [0,3,7];
  } else {
    intervals = [0,4,7];
  }

  return intervals.map(i => rootMidi + i);
}

function playTone(freq, start, dur, gain=0.08, type="triangle"){
  if(!Number.isFinite(freq)) return;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,start);
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(gain,start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  osc.connect(g).connect(audioCtx.destination);
  activeAudioNodes.push(osc, g);
  osc.onended = () => {
    activeAudioNodes = activeAudioNodes.filter(n => n !== osc && n !== g);
  };
  osc.start(start);
  osc.stop(start+dur+0.03);
}

function playChordHit(midis, start, dur){
  // Slightly stronger voicing for extended chords so 7ths are audible.
  midis.forEach((m,i)=>{
    const gain = i === midis.length - 1 ? 0.062 : 0.052;
    playTone(midiToFreq(m), start, dur, gain, i===0 ? "triangle" : "sine");
  });
}

function playRolledChord(midis, start, dur){
  const spread = Math.min(0.18, BEAT_SEC * 0.30);
  const step = midis.length > 1 ? spread / (midis.length - 1) : 0;
  midis.forEach((m,i)=>{
    const t = start + i * step;
    const remain = Math.max(0.08, dur - i * step);
    const gain = i === midis.length - 1 ? 0.066 : 0.054;
    playTone(midiToFreq(m), t, remain, gain, i===0 ? "triangle" : "sine");
  });
}

function playChordBox(box){
  if(!audioCtx) audioCtx=new (window.AudioContext || window.webkitAudioContext)();

  const name=displayName(box.dataset.chord || "C");
  const beats=Number(box.dataset.beats || 4);
  const dur=beats*BEAT_SEC;
  const now=audioCtx.currentTime+0.02;
  const midis=chordPcsFromName(name);

  // Use the lowest note of the actual chord as the lowest sound.
  // No separate octave-dropped bass note, so extended tones remain clearer.
  //
  // Pattern:
  // Beat 1 = full chord
  // Beat 2 = full chord
  // Beat 3 = quick rolled/arpeggiated chord
  // Beat 4 = full chord
  for(let beat=0; beat<beats; beat++){
    const t = now + beat * BEAT_SEC;
    const hitDur = BEAT_SEC * 0.82;

    if(beat % 4 === 2){
      playRolledChord(midis, t, hitDur);
    } else {
      playChordHit(midis, t, hitDur);
    }
  }

  return dur;
}

function clearPlayingHighlight(){
  document.querySelectorAll(".playing-chord").forEach(el=>el.classList.remove("playing-chord"));
  document.querySelectorAll(".playing-arrange").forEach(el=>el.classList.remove("playing-arrange"));
  if(arrangeFretboardPopup) arrangeFretboardPopup.classList.remove("playing-fretboard");
}

function syncPlaybackPanels(box){
  currentPlayingBox=box || null;

  document.querySelectorAll(".playing-arrange").forEach(el=>el.classList.remove("playing-arrange"));
  const boxes=Array.from(progressionArea.querySelectorAll(".prog-chord"));
  const idx=box ? boxes.indexOf(box) : -1;
  if(arrangeGrid && idx>=0){
    const activeCard=arrangeGrid.querySelector(`.arrange-card[data-prog-index="${idx}"]`);
    if(activeCard){
      activeCard.classList.add("playing-arrange");
      try { activeCard.scrollIntoView({block:"nearest", inline:"nearest", behavior:"smooth"}); } catch(e) {}
    }
  }

  if(box && arrangeFretboardPopup && arrangeFretboardPopup.classList.contains("show")){
    openArrangeFretboardForBox(box);
    arrangeFretboardPopup.classList.add("playing-fretboard");
  }
}

function stopPlayback(){
  isPlaying=false;
  playBtn.classList.remove("active");
  playBtn.textContent="▶";
  currentPlayingBox=null;
  clearPlayingHighlight();
  if(playTimeout) clearTimeout(playTimeout);
  playTimeout=null;
  if(playOverlay) playOverlay.classList.remove("show");

  // Immediately silence all currently sounding or scheduled oscillators.
  activeAudioNodes.forEach(node=>{
    try {
      if(node.stop) node.stop(0);
      if(node.disconnect) node.disconnect();
    } catch(e) {}
  });
  activeAudioNodes=[];

  // Closing the context is the most reliable way to cancel scheduled notes on iOS.
  if(audioCtx && audioCtx.state !== "closed"){
    try { audioCtx.close(); } catch(e) {}
  }
  audioCtx=null;
}

function playNextChord(){
  if(!isPlaying) return;
  const boxes=Array.from(progressionArea.querySelectorAll(".prog-chord"));
  if(boxes.length===0){ stopPlayback(); return; }

  clearPlayingHighlight();
  if(playIndex>=boxes.length) playIndex=0;
  const box=boxes[playIndex];
  box.classList.add("playing-chord");
  syncPlaybackPanels(box);

  const dur=playChordBox(box);
  playIndex++;

  playTimeout=setTimeout(playNextChord, dur*1000);
}

function getAudioContext(){
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!audioCtx || audioCtx.state === "closed"){
    audioCtx = new AudioContextClass();
  }
  return audioCtx;
}

function startPlayback(){
  const boxes = Array.from(progressionArea.querySelectorAll(".prog-chord"));
  if(boxes.length === 0) return;

  const ctx = getAudioContext();

  const actuallyStart = () => {
    if(isPlaying) return;
    isPlaying = true;
    playIndex = 0;
    playBtn.classList.add("active");
    playBtn.textContent = "■";
    if(playOverlay) playOverlay.classList.add("show");
    playNextChord();
  };

  if(ctx.state === "suspended"){
    ctx.resume().then(actuallyStart).catch(()=>{
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume().then(actuallyStart).catch(()=>{});
    });
  } else {
    actuallyStart();
  }
}

let lastPlayButtonTime = 0;

function handlePlayButton(e){
  if(e){
    e.preventDefault();
    e.stopPropagation();
  }

  const now = Date.now();
  if(now - lastPlayButtonTime < 250) return;
  lastPlayButtonTime = now;

  if(isPlaying){
    stopPlayback();
    return;
  }

  startPlayback();
}

playBtn.addEventListener("click", handlePlayButton);
playBtn.style.touchAction = "manipulation";
if(playOverlay){ playOverlay.addEventListener("click", e=>e.stopPropagation()); playOverlay.addEventListener("touchend", e=>e.stopPropagation(), {passive:false}); }
