<title>Diatonic Harmony Treemap</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:white;color:#111;display:flex;justify-content:center;align-items:center}
.wrap{width:min(100vw,1000px);height:min(100vh,1000px);position:relative;overflow:hidden;background:white}
.label{position:absolute;top:4%;width:210px;text-align:center;font-weight:850;font-size:clamp(15px,2vw,23px);line-height:1.1}
.left-label{left:18%;transform:translateX(-50%);color:#1550a8} .right-label{right:18%;transform:translateX(50%);color:#1f7a2e}
.chord-map{--cell:56px;--gap:4px;position:absolute;left:50%;top:4%;width:calc((var(--cell) * 2) + var(--gap));height:auto;transform:translateX(-50%);display:grid;grid-template-columns:repeat(2,var(--cell));grid-template-rows:repeat(5,var(--cell));gap:var(--gap);z-index:2}
.map-cell{border:3px solid #111;border-radius:12px;background:#eee;display:flex;align-items:center;justify-content:center;flex-direction:column;font-weight:900;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.12);padding:0;color:#111}
.map-cell.active{background:#d0d0d0;box-shadow:0 5px 13px rgba(0,0,0,.22)} .map-cell:hover{filter:brightness(.96)}
.map-chord{font-size:22px;line-height:.95} .map-rn{font-size:15px;margin-top:4px}
.map-I{grid-column:1/span 2;grid-row:1} .map-ii{grid-column:1;grid-row:2} .map-iii{grid-column:1;grid-row:3} .map-IV{grid-column:2;grid-row:2} .map-V{grid-column:2;grid-row:3} .map-vi{grid-column:1/span 2;grid-row:4} .map-vii{grid-column:1/span 2;grid-row:5;width:var(--cell);justify-self:center}
.stack{position:absolute;top:4%;bottom:26%;width:calc((56px * 2) + 4px);display:flex;flex-direction:column;gap:4px;overflow-y:auto;padding-right:2px}
.left-stack{left:18%;transform:translateX(-50%)} .right-stack{right:18%;transform:translateX(50%)}
.rect{border:4px solid;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.16);padding:6px;color:#222;min-height:34px}
.rect.lead{border-color:#2f73d8;background:linear-gradient(145deg,#f8fbff,#d8e9ff)} .rect.sub{border-color:#5ebd3e;background:linear-gradient(145deg,#fbfff8,#d9f4ce)}
.rect.active{filter:saturate(1.25);box-shadow:0 7px 20px rgba(0,0,0,.28)} .rect:hover{filter:brightness(.98)}
.name{font-weight:950;text-align:center;line-height:.95;font-size:clamp(13px,2vw,22px)} .fn{font-weight:750;text-align:center;line-height:1.05;margin-top:3px;font-size:clamp(8px,1.1vw,12px)}
.popup{position:absolute;background:white;border:3px solid #222;border-radius:16px;padding:12px 14px;font-size:clamp(14px,1.6vw,18px);line-height:1.25;box-shadow:0 8px 24px rgba(0,0,0,.24);display:none;z-index:10;max-width:360px;min-width:220px}
.popup.show{display:block} .popup-title{font-weight:950;font-size:1.14em;margin-bottom:4px}
.popup-notes{margin:8px 0 10px 0;padding:6px 8px;border:1px solid #bbb;border-radius:8px;background:#fafafa;font-size:.95em;line-height:1.2}
.popup-chain{display:grid;gap:4px;align-items:start} .popup-chain.cols-3{grid-template-columns:1fr auto 1fr auto 1fr} .popup-chain.cols-2{grid-template-columns:1fr auto 1fr}
.chain-col{padding:4px 5px;border-radius:7px;background:white;border:1px solid #ddd;min-width:54px} .chain-title{font-weight:950;margin-bottom:3px;font-size:.92em;text-align:center} .chain-arrow{align-self:center;font-weight:950;font-size:1.1em}
.note-plain{white-space:nowrap} .note-arrow{white-space:nowrap;font-weight:900;color:#111} .note-unresolved{white-space:nowrap;font-weight:900;color:#c01818}
@media(max-width:700px){
 .label{top:4%;font-size:11px;width:110px} .chord-map{--cell:48px;--gap:3px;width:calc((var(--cell) * 2) + var(--gap));height:auto;gap:var(--gap);grid-template-columns:repeat(2,var(--cell));grid-template-rows:repeat(5,var(--cell))} .map-cell{border-width:2px;border-radius:9px} .map-chord{font-size:18px} .map-rn{font-size:10px;margin-top:1px}
 .stack{top:4%;bottom:26%;width:calc((48px * 2) + 3px);gap:3px} .rect{border-width:2px;border-radius:9px;padding:3px} .name{font-size:12px} .fn{font-size:7.5px}
 .popup{min-width:170px;max-width:285px;font-size:15px;padding:9px 10px;border-width:2px;border-radius:12px}
}

/* Enforced shared geometry:
   squares = 1 unit wide x 1 unit high
   rectangles = 2 units wide x 1 unit high */
.chord-map {
  --cell: 52px !important;
  --gap: 4px !important;
  width: calc((var(--cell) * 2) + var(--gap)) !important;
  grid-template-columns: repeat(2, var(--cell)) !important;
  grid-template-rows: repeat(5, var(--cell)) !important;
  gap: var(--gap) !important;
}

.map-I,
.map-vi {
  width: calc((var(--cell) * 2) + var(--gap)) !important;
  height: var(--cell) !important;
}

.map-ii,
.map-iii,
.map-IV,
.map-V,
.map-vii {
  width: var(--cell) !important;
  height: var(--cell) !important;
}

.map-vii {
  justify-self: center !important;
}

.stack {
  width: calc((52px * 2) + 4px) !important;
  gap: 4px !important;
}

.rect {
  width: calc((52px * 2) + 4px) !important;
  height: 52px !important;
  flex: 0 0 52px !important;
}

@media (max-width: 700px) {
  .chord-map {
    --cell: 44px !important;
    --gap: 3px !important;
    width: calc((var(--cell) * 2) + var(--gap)) !important;
    grid-template-columns: repeat(2, var(--cell)) !important;
    grid-template-rows: repeat(5, var(--cell)) !important;
  }

  .map-I,
  .map-vi {
    width: calc((var(--cell) * 2) + var(--gap)) !important;
    height: var(--cell) !important;
  }

  .map-ii,
  .map-iii,
  .map-IV,
  .map-V,
  .map-vii {
    width: var(--cell) !important;
    height: var(--cell) !important;
  }

  .stack {
    width: calc((44px * 2) + 3px) !important;
    gap: 3px !important;
  }

  .rect {
    width: calc((44px * 2) + 3px) !important;
    height: 44px !important;
    flex: 0 0 44px !important;
  }
}


.builder-controls {
  position:absolute;
  left:50%;
  bottom:32%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
  z-index:30;
}

.builder-btn {

  font-weight:850;
  font-size:19px;
  padding:6px 10px;
  min-width:48px;

}

.builder-btn:disabled {

  cursor:default;
}

.builder-btn.active {
  background:#111;
  color:#fff;
}

.builder-status { display:none;
  position:absolute;
  left:50%;
  bottom:40%;
  transform:translateX(-50%);

  font-weight:750;
  color:#333;
  text-align:center;
  width:92%;
  z-index:25;
  pointer-events:none;
}

.progression-area {
  position:absolute;
  left:50%;
  top:58%;
  transform:translateX(-50%);
  width:64%;
  max-height:34%;
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-start;
  align-content:flex-start;
  gap:8px 10px;
  overflow:hidden;
  z-index:20;
  pointer-events:none;
}

.prog-chord {
  min-width:74px;
  min-height:30px;
  border:0;
  border-radius:0;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  flex-direction:row;
  gap:5px;
  font-weight:900;
  position:relative;
  box-shadow:none;
  pointer-events:auto;
  padding:2px 3px;
}

.prog-chord.lead-prog {
  color:#1550a8;
}

.prog-chord.sub-prog {
  color:#1f7a2e;
}

.prog-symbol {
  font-size:26px;
  line-height:1;
  white-space:nowrap;
}

.prog-slash {
  font-size:26px;
  line-height:1;
  opacity:.8;
}

.build-selectable {
  outline:3px solid #f2b705;
  outline-offset:2px;
}

.build-selected {
  outline:4px solid #111 !important;
  outline-offset:2px;
}

@media(max-width:700px){
  .builder-controls {

  }

  .builder-status { display:none;

  }

  .progression-area {
    right:2%;

  }

    min-height:24px;

/* Progression now reads like normal writing: left-to-right, then downward. */
.progression-area {
  left: 50% !important;
  right: auto !important;
  top: 58% !important;
  bottom: auto !important;
  transform: translateX(-50%) !important;
  width: 64% !important;
  max-height: 34% !important;
  display: flex !important;
  flex-wrap: wrap !important;

}

/* Dark-glass visual redesign */
:root {
  --glass-bg:#081019;
  --glass-panel:#111a26;
  --glass-panel-2:#172232;
  --glass-border:#344152;
  --glass-border-soft:#243143;
  --glass-text:#e9eef7;
  --glass-muted:#aeb9c8;
  --glass-shadow:rgba(0,0,0,.55);
  --lead-blue:#2f73d8;
  --sub-green:#5ebd3e;
}

body {
  background:
    radial-gradient(circle at 50% 0%, rgba(64,82,110,.22), transparent 42%),
    linear-gradient(180deg, #121a26 0%, #070c13 100%) !important;
  color:var(--glass-text) !important;
}

.wrap {
  background:
    linear-gradient(180deg, rgba(19,29,42,.96), rgba(6,11,18,.98)) !important;
  border:3px solid rgba(112,130,154,.24);
  border-radius:34px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.04),
    0 18px 44px rgba(0,0,0,.55);
}

.wrap::before {
  content:"Comp-Map";
  position:absolute;
  left:50%;
  top:0.7%;
  transform:translateX(-50%);
  color:rgba(232,239,249,.78);
  font-weight:950;
  letter-spacing:3px;
  font-size:18px;
  z-index:5;
  pointer-events:none;
}

/* Main columns */
.stack,
.chord-map,
.progression-area {
  background:
    linear-gradient(180deg, rgba(26,39,56,.70), rgba(9,15,24,.70)) !important;
  border:2px solid rgba(123,143,169,.24);
  border-radius:22px;
  box-shadow:
    inset 0 0 22px rgba(255,255,255,.025),
    0 8px 24px rgba(0,0,0,.24);
  padding:8px !important;
}

.chord-map {
  padding:6px !important;
}

/* Buttons / controls */
.builder-controls {
  background:rgba(13,22,34,.72);
  border:2px solid rgba(123,143,169,.25);
  border-radius:16px;
  padding:6px;
  box-shadow:
    inset 0 0 12px rgba(255,255,255,.03),
    0 6px 16px rgba(0,0,0,.35);
}

.builder-btn,
.key-select,
.edit-btn {
  background:
    linear-gradient(180deg, #182436 0%, #090f18 100%) !important;
  color:var(--glass-text) !important;
  border:2px solid rgba(132,150,174,.42) !important;
  border-radius:13px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.09),
    0 3px 8px rgba(0,0,0,.38);
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.builder-btn.active,
.play-btn.active {
  background:
    linear-gradient(180deg, #dfe6f0 0%, #9daaba 100%) !important;
  color:#07101a !important;
  border-color:#e9eef7 !important;
  text-shadow:none;
}

.key-select option {
  background:#111a26;
  color:#e9eef7;
}

/* Diatonic selector */
.map-cell {
  background:
    linear-gradient(180deg, #202d3e 0%, #0b121d 100%) !important;
  color:var(--glass-text) !important;
  border:2px solid rgba(144,160,181,.44) !important;
  border-radius:12px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 4px 11px rgba(0,0,0,.38) !important;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.map-cell.active,
.map-cell.build-selected {
  background:
    linear-gradient(180deg, #e6edf7 0%, #a8b5c5 100%) !important;
  color:#07101a !important;
  border-color:#eef4ff !important;
  text-shadow:none;
}

/* Leading / substitution cards */
.rect {
  background:
    linear-gradient(180deg, #1d2a3c 0%, #0b121d 100%) !important;
  color:var(--glass-text) !important;
  border-radius:13px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.07),
    0 4px 11px rgba(0,0,0,.36) !important;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

.rect.lead {
  border-color:rgba(47,115,216,.84) !important;
}

.rect.sub {
  border-color:rgba(94,189,62,.84) !important;
}

.rect.active {
  background:

  padding:0 !important;

  background:transparent !important;

  background:transparent !important;
  border:none !important;

.progression-area {

function parseChordNotes(name){

function visibleGroupBounds(groupEl, itemSelector){
  const items = Array.from(groupEl.querySelectorAll(itemSelector));
  const wrap = document.getElementById("wrap").getBoundingClientRect();

  if(items.length === 0){
    const r = groupEl.getBoundingClientRect();
    return {
      center:r.left - wrap.left + r.width/2,
      top:r.top - wrap.top,
      bottom:r.bottom - wrap.top
    };
  }

  let left=Infinity, right=-Infinity, top=Infinity, bottom=-Infinity;
  items.forEach(item=>{
    const r = item.getBoundingClientRect();
    left = Math.min(left, r.left - wrap.left);
    right = Math.max(right, r.right - wrap.left);
    top = Math.min(top, r.top - wrap.top);
    bottom = Math.max(bottom, r.bottom - wrap.top);
  });

  return {center:(left+right)/2, top, bottom};
}

function placePromptUnder(el, bounds){
  if(!el || !bounds) return;
  const wrap = document.getElementById("wrap").getBoundingClientRect();
  const promptR = el.getBoundingClientRect();

  // Center by putting the prompt's anchor at the group midpoint.
  // CSS transform: translateX(-50%) does the actual centering.
  let center = bounds.center;
  center = Math.max(promptR.width/2 + 2, Math.min(wrap.width - promptR.width/2 - 2, center));

  const top = bounds.bottom + 3;

  el.style.left = center + "px";
  el.style.top = Math.max(2, Math.min(wrap.height - promptR.height - 2, top)) + "px";
}

function guessChordTypeFromText(chord){
  const clean = chord.replace(/^\[/,"").replace(/\]$/,"");
  const baseClean = reverseToBaseChord ? reverseToBaseChord(clean) : clean;
  const allDiatonic = order.map(k => dataForDisplay(k).chord);
  if(allDiatonic.includes(clean)) return "diatonic";

  // Prefer color coding based on the currently visible chord sets.
  const visibleLead = dataForDisplay(currentKey).leads.map(i=>i.name);
  const visibleSub = dataForDisplay(currentKey).subs.map(i=>i.name);
  if(visibleLead.includes(clean)) return "lead";
  if(visibleSub.includes(clean)) return "sub";

  // Bracketed chords are non-diatonic; default them to substitution color.
  if(chord.trim().startsWith("[")) return "sub";
  return "diatonic";
}

function tokenizeProgression(text){
  const tokens = [];
  const re = /\[[^\]]+\]|\/|[A-G](?:#|♭|b)?(?:m7♭5|m7b5|maj7|m7|dim|°|ø|m|7)?/g;
  let m;
  while((m = re.exec(text)) !== null){
    tokens.push(m[0]);
  }
  return tokens;
}

function assimilateProgression(text){
  const tokens = tokenizeProgression(text);
  if(tokens.length === 0) return;

  progressionArea.innerHTML = "";

  let i = 0;
  while(i < tokens.length){
    const tok = tokens[i];

    if(tok === "/"){
      i++;
      continue;
    }

    let chord = tok;
    let bracketed = false;
    if(chord.startsWith("[") && chord.endsWith("]")){
      bracketed = true;
      chord = chord.slice(1,-1).trim();
    }

    let beats = 1;
    i++;
    while(i < tokens.length && tokens[i] === "/"){
      beats++;
      i++;
    }

    const type = bracketed ? guessChordTypeFromText(`[${chord}]`) : guessChordTypeFromText(chord);
    addProgressionBox(chord, type, beats);
  }
}

  if(!editingChord) return;
  replacingChord=editingChord;
  hideEditPopup();
  startAddMode();

deleteChordBtn.addEventListener("click",e=>{
  e.stopPropagation();
  if(!editingChord) return;
  const box=editingChord;
  hideEditPopup();
  box.remove();

closeEditBtn.addEventListener("click",e=>{
  e.stopPropagation();
  hideEditPopup();
});

editPopup.addEventListener("click",e=>e.stopPropagation());

let audioCtx=null;
let isPlaying=false;
let playIndex=0;
let playTimeout=null;
let activeAudioNodes=[];
const BPM=100;
const BEAT_SEC=60/BPM;

const NOTE_MIDI = {
  "C":60,"C#":61,"D♭":61,"Db":61,"D":62,"D#":63,"E♭":63,"Eb":63,"E":64,"F":65,"F#":66,"G♭":66,"Gb":66,
  "G":67,"G#":68,"A♭":68,"Ab":68,"A":69,"A#":70,"B♭":70,"Bb":70,"B":71,"Cb":71
};

function midiToFreq(m){ return 440 * Math.pow(2,(m-69)/12); }

function chordPcsFromName(name){
  const raw = (name || "").replace("♭","b");
  const m = raw.match(/^[A-G](?:#|b)?/);
  if(!m) return [60,64,67];
  const rootRaw = m[0];
  const displayRoot = rootRaw.replace("b","♭");
  const rootMidi = NOTE_MIDI[displayRoot] ?? 60;
  const has = s => name.includes(s);

  let intervals;
  if(has("°")) intervals=[0,3,6];
  else if(has("ø") || has("m7♭5") || has("m7b5")) intervals=[0,3,6,10];
  else if(has("7") && !has("maj")) intervals=[0,4,7,10];
  else if(has("m") && !has("maj")) intervals=[0,3,7];
  else intervals=[0,4,7];

  return intervals.map(i=>rootMidi+i);
}

function playTone(freq, start, dur, gain=0.08, type="triangle"){
  if(!Number.isFinite(freq)) return;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,start);
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(gain,start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  osc.connect(g).connect(audioCtx.destination);
  activeAudioNodes.push(osc, g);
  osc.onended = () => {
    activeAudioNodes = activeAudioNodes.filter(n => n !== osc && n !== g);
  };
  osc.start(start);
  osc.stop(start+dur+0.03);
}

function playChordHit(midis, start, dur){
  midis.forEach((m,i)=>{
    playTone(midiToFreq(m), start, dur, 0.05, i===0 ? "triangle" : "sine");
  });
}

function playBassHit(midis, start, dur){
  playTone(midiToFreq(midis[0]-24), start, dur, 0.095, "sine");
}

function playChordBox(box){
  if(!audioCtx) audioCtx=new (window.AudioContext || window.webkitAudioContext)();

  const name=box.dataset.chord || "C";
  const beats=Number(box.dataset.beats || 4);
  const dur=beats*BEAT_SEC;
  const now=audioCtx.currentTime+0.02;
  const midis=chordPcsFromName(name);

  // Four-beat pattern at 100 bpm:
  // beat 1 = bass only
  // beat 2 = chord only
  // beat 3 = bass + chord
  // beat 4 = chord only
  for(let beat=0; beat<beats; beat++){
    const t = now + beat * BEAT_SEC;
    const hitDur = BEAT_SEC * 0.82;

    if(beat % 4 === 0){
      playBassHit(midis, t, hitDur);
    } else if(beat % 4 === 1){
      playChordHit(midis, t, hitDur);
    } else if(beat % 4 === 2){
      playBassHit(midis, t, hitDur);
      playChordHit(midis, t, hitDur);
    } else {
      playChordHit(midis, t, hitDur);
    }
  }

  return dur;
}

function clearPlayingHighlight(){
  document.querySelectorAll(".playing-chord").forEach(el=>el.classList.remove("playing-chord"));
}

function stopPlayback(){
  isPlaying=false;
  playBtn.classList.remove("active");
  playBtn.textContent="▶";
  clearPlayingHighlight();
  if(playTimeout) clearTimeout(playTimeout);
  playTimeout=null;
  if(playOverlay) playOverlay.classList.remove("show");

  // Immediately silence all currently sounding or scheduled oscillators.
  activeAudioNodes.forEach(node=>{
    try {
      if(node.stop) node.stop(0);
      if(node.disconnect) node.disconnect();
    } catch(e) {}
  });
  activeAudioNodes=[];

  // Closing the context is the most reliable way to cancel scheduled notes on iOS.
  if(audioCtx && audioCtx.state !== "closed"){
    try { audioCtx.close(); } catch(e) {}
  }
  audioCtx=null;
}

function playNextChord(){
  if(!isPlaying) return;
  const boxes=Array.from(progressionArea.querySelectorAll(".prog-chord"));
  if(boxes.length===0){ stopPlayback(); return; }

  clearPlayingHighlight();
  if(playIndex>=boxes.length) playIndex=0;
  const box=boxes[playIndex];
  box.classList.add("playing-chord");

  const dur=playChordBox(box);
  playIndex++;

  playTimeout=setTimeout(playNextChord, dur*1000);
}

function getAudioContext(){
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!audioCtx || audioCtx.state === "closed"){
    audioCtx = new AudioContextClass();
  }
  return audioCtx;
}

function startPlayback(){
  const boxes = Array.from(progressionArea.querySelectorAll(".prog-chord"));
  if(boxes.length === 0) return;

  const ctx = getAudioContext();

  const actuallyStart = () => {
    if(isPlaying) return;
    isPlaying = true;
    playIndex = 0;
    playBtn.classList.add("active");
    playBtn.textContent = "■";
    if(playOverlay) playOverlay.classList.add("show");
    playNextChord();
  };

  if(ctx.state === "suspended"){
    ctx.resume().then(actuallyStart).catch(()=>{
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume().then(actuallyStart).catch(()=>{});
    });
  } else {
    actuallyStart();
  }
}

let lastPlayButtonTime = 0;

function handlePlayButton(e){
  if(e){
    e.preventDefault();
    e.stopPropagation();
  }

  const now = Date.now();
  if(now - lastPlayButtonTime < 250) return;
  lastPlayButtonTime = now;

  if(isPlaying){
    stopPlayback();
    return;
  }

  startPlayback();
}

playBtn.addEventListener("click", handlePlayButton);
playBtn.style.touchAction = "manipulation";
if(playOverlay){ playOverlay.addEventListener("click", e=>e.stopPropagation()); playOverlay.addEventListener("touchend", e=>e.stopPropagation(), {passive:false}); }


window.addEventListener("resize",positionPrompts);
render("C");
</script>
